spring.application.name=api-gateway

server.port=8080

# ===============================
# Eureka Configuration
# ===============================
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# ===============================
# Gateway Routes
# ===============================



# Auth Service
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Developer Service
spring.cloud.gateway.server.webmvc.routes[1].id=developer-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://DEVELOPER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/developers/**