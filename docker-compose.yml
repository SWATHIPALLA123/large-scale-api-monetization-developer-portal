postgres:
  image: postgres:17
  container_name: postgres
  environment:
    POSTGRES_DB: api_monetization
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: Nani123@
  ports:
    - "5432:5432"
  volumes:
    - postgres_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres -d api_monetization"]
    interval: 10s
    timeout: 5s
    retries: 10